name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gjs libglib2.0-bin libglib2.0-dev-bin gettext zip jq

      - name: Run unit tests
        run: make test

      - name: Compile schemas and translations
        run: make all

      - name: Package extension
        run: make pack

      - name: Compute artifact name
        id: artifact
        run: |
          UUID=$(jq -r .uuid metadata.json)
          ZIP="${UUID}.shell-extension.zip"
          test -f "$ZIP" || { echo "::error::$ZIP not produced"; exit 1; }
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.artifact.outputs.uuid }}
          path: ${{ steps.artifact.outputs.zip }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "${{ steps.artifact.outputs.zip }}"
